<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GameHub - Tienda Gamer</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="shortcut icon" href="Logo.png" type="image/x-icon">
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="logo">GameHub</div>
        <button class="btn-login" onclick="abrirLogin()">Iniciar sesión</button>
    </div>

    <nav>
        <ul>
            <li>Inicio</li>
            <li>Consolas</li>
            <li>Juegos</li>
            <li>Accesorios</li>
        </ul>
    </nav>
</header>

<section class="banner"></section>

<section class="section">
    <center><h1>Bienvenido a GameHub 🎮</h1></center>
    <h2>Novedades</h2>
    <div class="productos">

        <div class="card">
            <img src="tecladogamer.webp">
            <h3>Teclado Gamer</h3>
            <p class="precio">S/ 199.90</p>
            <button onclick="agregarCarrito('Teclado Gamer')">Comprar</button>
        </div>

        <div class="card">
            <img src="audifonosgamer.webp">
            <h3>Audífonos Gamer</h3>
            <p class="precio">S/ 249.90</p>
            <button onclick="agregarCarrito('Audífonos Gamer')">Comprar</button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 GameHub</p>
</footer>

<div id="modalLogin" class="modal">
    <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarLogin()">&times;</span>
        <h2>Iniciar Sesión 🎮</h2>
        <input type="text" placeholder="Usuario" id="usuario">
        <input type="password" placeholder="Contraseña" id="password">
        <button onclick="iniciarSesion()">Entrar</button>
    </div>
</div>

<script src="funciones.js"></script>
</body>
</html>
